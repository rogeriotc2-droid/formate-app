    <!-- Facebook Pixel — stub queues events immediately; the heavy

    <script>
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?

      (function(){
        function loadPixel(){
          if(window.__fbPixelLoaded)return;window.__fbPixelLoaded=true;
          var t=document.createElement('script');t.async=true;
          t.src='https://connect.facebook.net/en_US/fbevents.js';
          var s=document.getElementsByTagName('script')[0];
          s.parentNode.insertBefore(t,s);
        }
        function schedule(){
          if('requestIdleCallback' in window){requestIdleCallback(loadPixel,{timeout:2000});}
          else{setTimeout(loadPixel,300);}
        }
        if(document.readyState==='interactive'||document.readyState==='complete')schedule();
        else window.addEventListener('DOMContentLoaded',schedule);
        // Also load on first interaction in case the page is left open.
        ['scroll','mousemove','touchstart','keydown'].forEach(function(ev){
          window.addEventListener(ev,loadPixel,{once:true,passive:true});
        });
      })();
