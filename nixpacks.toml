[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = ["PUPPETEER_SKIP_DOWNLOAD=true pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/safeiq run build:client",
  "PORT=3000 BASE_PATH=/hero-loop/ pnpm --filter @workspace/formate-hero-loop run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
